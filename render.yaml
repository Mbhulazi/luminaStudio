# Render Blueprint — Infrastructure-as-Code for the Lummina Studio backend.
# https://render.com/docs/blueprint-spec
#
# HOW TO USE:
#   1. Push this file (it lives at the repo root so Render can find it).
#   2. Render → New → Blueprint → pick this repo. Render reads this file and
#      creates the service for you — no manual form-filling.
#   3. SECRETS: secrets are managed in Doppler (see SECRETS.md). The backend
#      fetches them at boot via `doppler run`. The ONLY secret you set directly
#      on Render is DOPPLER_TOKEN (a Doppler service token for the prd config).
#      Never put real secrets in this committed file.
#
# This defines ONLY the backend. The frontend deploys to Vercel separately.

services:
  - type: web
    name: lummina-backend
    runtime: node
    # Render checks out the WHOLE repo; run the backend from its subfolder.
    rootDir: lumina-backend
    plan: free                 # bump to starter when you go live (sleeps on free)
    region: oregon             # change to frankfurt/singapore if closer to your users
    # Node 18+ is required (package.json engines). Render honours .nvmrc /
    # package.json engines automatically; pin explicitly if you prefer:
    # nodeVersion: 20.x
    # Build: install deps, generate the Prisma client, and install the Doppler
    # CLI (used by startCommand to fetch secrets at boot).
    buildCommand: npm install && npx prisma generate && (curl -Ls https://doppler.com/install.sh | sh)
    startCommand: doppler run --token "$DOPPLER_TOKEN" --project lummina-studio --config prd -- node src/server.js
    healthCheckPath: /ready
    autoDeploy: true
    # ── Environment variables ──
    # Only DOPPLER_TOKEN is set on Render directly. Everything else comes from
    # Doppler at boot via `doppler run`. Never put real secrets here.
    envVars:
      - key: DOPPLER_TOKEN
        sync: false            # SECRET: the Doppler service token for prd config
