# Render Blueprint — Infrastructure-as-Code for the Lummina Studio backend.
# https://render.com/docs/blueprint-spec
#
# HOW TO USE:
#   1. Push this file (it lives at the repo root so Render can find it).
#   2. Render → New → Blueprint → pick this repo. Render reads this file and
#      creates the service for you — no manual form-filling.
#   3. SECRETS: set each secret directly in Render → Environment tab. Source
#      the values from Doppler (see SECRETS.md). Keep them in sync manually
#      or via the Doppler→Render integration. Never commit real secrets.
#
# This defines ONLY the backend. The frontend deploys to Vercel separately.

services:
  - type: web
    name: lummina-backend
    runtime: node
    # Render checks out the WHOLE repo; run the backend from its subfolder.
    rootDir: lumina-backend
    plan: free                 # bump to starter when you go live (sleeps on free)
    region: oregon             # change to frankfurt/singapore if closer to your users
    # Node 18+ is required (package.json engines). Render honours .nvmrc /
    # package.json engines automatically; pin explicitly if you prefer:
    # nodeVersion: 20.x
    # Build: install deps and generate the Prisma client.
    buildCommand: npm install && npx prisma generate
    startCommand: node src/server.js
    healthCheckPath: /ready
    autoDeploy: true
    # ── Environment variables ──
    # Set these in Render → Environment (sourced from Doppler prd config).
    # Listed here as sync:false so Render doesn't try to fill them from the repo.
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: PAYFAST_MODE
        sync: false
      - key: PAYFAST_MERCHANT_ID
        sync: false
      - key: PAYFAST_MERCHANT_KEY
        sync: false
      - key: PAYFAST_PASSPHRASE
        sync: false
      - key: PAYFAST_NOTIFY_URL
        sync: false
      - key: PAYFAST_RETURN_URL
        sync: false
      - key: PAYFAST_CANCEL_URL
        sync: false
      - key: EMAIL_DRIVER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: STORAGE_DRIVER
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: portraits
      - key: LLM_DRIVER
        value: template
