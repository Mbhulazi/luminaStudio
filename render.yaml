# Render Blueprint — Infrastructure-as-Code for the Lummina Studio backend.
# https://render.com/docs/blueprint-spec
#
# HOW TO USE:
#   1. Push this file (it lives at the repo root so Render can find it).
#   2. Render → New → Blueprint → pick this repo. Render reads this file.
#   3. Non-secret config is hardcoded below (NODE_ENV, URLs, driver choices).
#      Actual secrets (DATABASE_URL, JWT_SECRET, PayFast creds) are sync:false
#      and MUST be set in Render → Environment tab.
#
# This defines ONLY the backend. The frontend deploys to Vercel separately.

services:
  - type: web
    name: lummina-backend
    runtime: node
    rootDir: lumina-backend
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate
    startCommand: node src/server.js
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      # ── Non-secret config (committed) ──
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "https://lumminastudio.com,https://www.lumminastudio.com"
      - key: APP_BASE_URL
        value: "https://lumminastudio.com"
      - key: PORT
        value: "4000"
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: LOG_LEVEL
        value: "info"
      - key: STORAGE_DRIVER
        value: supabase
      - key: SUPABASE_STORAGE_BUCKET
        value: portraits
      - key: LLM_DRIVER
        value: template
      - key: LLM_MAX_COST_CENTS
        value: "50"
      - key: USD_TO_ZAR_FALLBACK_RATE
        value: "18.50"
      - key: EMAIL_DRIVER
        value: smtp
      - key: EMAIL_FROM_NAME
        value: "Lummina Studio"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: PAYFAST_MODE
        value: live
      - key: PAYFAST_IP_TTL_MS
        value: "21600000"
      - key: PAYFAST_NOTIFY_URL
        value: "https://lummina-backend.onrender.com/api/payments/payfast/itn"
      - key: PAYFAST_RETURN_URL
        value: "https://lumminastudio.com/checkout?status=success"
      - key: PAYFAST_CANCEL_URL
        value: "https://lumminastudio.com/checkout?status=cancelled"
      # ── Secrets ──
      # DATABASE_URL is committed here because Render's Environment tab was
      # not reliably saving the value (every edit reverted to the stale direct
      # connection string, causing IPv6 unreachable errors). Rotate this
      # password in Supabase after launch and move it back to sync:false.
      - key: DATABASE_URL
        value: "postgresql://postgres.pppiquczkedsmbdrshrm:nondeni19920202@aws-0-eu-west-1.pooler.supabase.com:5432/postgres?connect_timeout=10&pool_timeout=10"
      - key: JWT_SECRET
        value: "1dc91b2ca72e70f093283bd5e142d2dfc4860c49b71ceffb3b033e252583b117"
      - key: PAYFAST_MERCHANT_ID
        sync: false
      - key: PAYFAST_MERCHANT_KEY
        sync: false
      - key: PAYFAST_PASSPHRASE
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
